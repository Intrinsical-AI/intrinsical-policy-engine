name: Public CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PYTHONHASHSEED: "0"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Public release guard
        run: uv run python scripts/check_public_release.py
      - name: Lint
        run: uv run ruff check src tests scripts
      - name: Format check
        run: uv run ruff format --check src tests scripts
      - name: Type check
        run: uv run mypy src --ignore-missing-imports
      - name: Validate starter pack
        run: uv run ipe lint --contracts frameworks/starter --strict
      - name: Export and seal starter pack
        env:
          IPE_SKIP_GPG_SIGNING: "1"
        run: |
          uv run ipe export --contracts frameworks/starter --answers demos/starter/basic/answers.json --out out/starter --strict --strict-templates
          uv run ipe seal --export-dir out/starter
      - name: Tests
        run: uv run pytest tests/unit tests/smoke --tb=short --cov=src --cov-report=term-missing
